<svg xmlns="http://www.w3.org/2000/svg" width="980" height="300" viewBox="0 0 980 300">
  <rect width="980" height="300" fill="#fffdfa"/>
  <text x="40" y="42" font-family="Arial" font-size="28" fill="#2d3142">Information Theory Intuition Map</text>
  <rect x="50" y="95" width="170" height="90" rx="16" fill="#e5f0ff" stroke="#3563a9" stroke-width="2"/>
  <rect x="270" y="95" width="170" height="90" rx="16" fill="#e6fff4" stroke="#248a5a" stroke-width="2"/>
  <rect x="490" y="95" width="170" height="90" rx="16" fill="#fff2dc" stroke="#c27a00" stroke-width="2"/>
  <rect x="710" y="95" width="180" height="90" rx="16" fill="#ffe4ef" stroke="#b83280" stroke-width="2"/>
  <text x="101" y="132" font-family="Arial" font-size="22" fill="#2d3142">entropy</text>
  <text x="74" y="158" font-family="Arial" font-size="15" fill="#2d3142">average surprise</text>
  <text x="328" y="132" font-family="Arial" font-size="22" fill="#16553d">KL divergence</text>
  <text x="289" y="158" font-family="Arial" font-size="15" fill="#16553d">wasted bits from wrong belief</text>
  <text x="512" y="132" font-family="Arial" font-size="22" fill="#8a5a00">mutual information</text>
  <text x="517" y="158" font-family="Arial" font-size="15" fill="#8a5a00">uncertainty removed by observation</text>
  <text x="744" y="132" font-family="Arial" font-size="22" fill="#8a1f5d">rate-distortion</text>
  <text x="741" y="158" font-family="Arial" font-size="15" fill="#8a1f5d">how many bits for acceptable loss</text>
  <path d="M220 140 H270" stroke="#2d3142" stroke-width="4" fill="none"/>
  <path d="M440 140 H490" stroke="#2d3142" stroke-width="4" fill="none"/>
  <path d="M660 140 H710" stroke="#2d3142" stroke-width="4" fill="none"/>
  <text x="48" y="230" font-family="Arial" font-size="18" fill="#2d3142">Core movie:</text>
  <text x="146" y="230" font-family="Arial" font-size="18" fill="#2d3142">probabilities -> surprise -> coding cost -> compression tradeoffs</text>
</svg>
