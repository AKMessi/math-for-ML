<svg xmlns="http://www.w3.org/2000/svg" width="980" height="300" viewBox="0 0 980 300">
  <rect width="980" height="300" fill="#fffdf9"/>
  <text x="40" y="42" font-family="Arial" font-size="28" fill="#3d405b">Probability And Statistics Intuition Map</text>
  <rect x="40" y="95" width="170" height="90" rx="16" fill="#e3f2fd" stroke="#2b6cb0" stroke-width="2"/>
  <rect x="250" y="95" width="170" height="90" rx="16" fill="#edf7ed" stroke="#2f855a" stroke-width="2"/>
  <rect x="460" y="95" width="180" height="90" rx="16" fill="#fff3da" stroke="#c47a00" stroke-width="2"/>
  <rect x="690" y="95" width="220" height="90" rx="16" fill="#fde2e4" stroke="#c53030" stroke-width="2"/>
  <text x="65" y="132" font-family="Arial" font-size="22" fill="#3d405b">uncertainty</text>
  <text x="58" y="158" font-family="Arial" font-size="15" fill="#3d405b">what could happen?</text>
  <text x="278" y="132" font-family="Arial" font-size="22" fill="#1e5d41">conditioning</text>
  <text x="278" y="158" font-family="Arial" font-size="15" fill="#1e5d41">what changed after evidence?</text>
  <text x="492" y="132" font-family="Arial" font-size="22" fill="#8a5a00">expectation / variance</text>
  <text x="495" y="158" font-family="Arial" font-size="15" fill="#8a5a00">center and spread</text>
  <text x="736" y="132" font-family="Arial" font-size="22" fill="#8f2230">inference / testing</text>
  <text x="724" y="158" font-family="Arial" font-size="15" fill="#8f2230">what the data lets you claim</text>
  <path d="M210 140 H250" stroke="#3d405b" stroke-width="4" fill="none"/>
  <path d="M420 140 H460" stroke="#3d405b" stroke-width="4" fill="none"/>
  <path d="M640 140 H690" stroke="#3d405b" stroke-width="4" fill="none"/>
  <text x="42" y="230" font-family="Arial" font-size="18" fill="#3d405b">Core movie:</text>
  <text x="143" y="230" font-family="Arial" font-size="18" fill="#3d405b">model uncertainty -> observe data -> update belief -> make decisions</text>
</svg>
